market:
  asset_class: etf
  universe_name: liquid_etf_sample
  timeframe: daily
  default_tickers:
    - SPY   # S&P 500
    - QQQ   # Nasdaq 100
    - IWM   # Russell 2000
    - GLD   # Gold
    - TLT   # Long-term treasuries
  data_source: yfinance

backtest:
  start_date: "2015-01-01"
  end_date: "2025-01-01"
  initial_capital: 100000

costs:
  commission: 0.0005     # 0.05% per trade
  slippage: 0.0005       # 0.05% per trade

metrics:
  min_sharpe_ratio: 1.0
  max_drawdown: 0.20     # maximum tolerated drawdown magnitude
  min_profit_factor: 1.3
  min_trades: 100
  min_expectancy: 0.0
  min_win_rate: 0.60
  min_annual_return: 0.05

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  log_to_file: false
  log_file: logs/smarttraderbot.log
